name: Trivy Secrets Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  # Required for uploading results to GitHub's Security tab
  security-events: write 

jobs:
  trivy_secrets_scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Full git history is required for a complete scan

    - name: Run Trivy secret scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs # Use filesystem scan for the entire repository
        scan-ref: .
        scanners: secret # Only enable the secret scanner
        format: sarif # SARIF format is required for GitHub Code Scanning integration
        output: trivy-results.sarif
        severity: CRITICAL,HIGH,MEDIUM,LOW # Define the severities to report
        exit-code: 1 # Set exit code to 0 to allow the pipeline to continue even if issues are found, so results can be uploaded
        cache-dir: /tmp/trivy-cache # Cache directory to speed up future scans

    - name: Upload Trivy scan results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always() # Run this step even if the previous scan step fails
      with:
        sarif_file: trivy-results.sarif
